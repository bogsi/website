{{ define "main" }}
<div class="post">
  <h1 class="post-title">{{ .Title }}</h1>
  <div class="post-content">
    {{ .Content }}

    <form class="order-form" id="orderForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" autocomplete="organization">
      </div>

      <div class="form-group">
        <label for="service">Service <span class="required">*</span></label>
        <select id="service" name="service" required>
          <option value="">— Select a service —</option>
          <option value="AWS Infrastructure Setup">AWS Infrastructure Setup</option>
          <option value="Terraform Automation">Terraform Automation</option>
          <option value="CI/CD Pipeline">CI/CD Pipeline</option>
          <option value="Cloud Cost Optimisation">Cloud Cost Optimisation</option>
          <option value="Security & Compliance">Security &amp; Compliance</option>
          <option value="Consulting / Audit">Consulting / Audit</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description <span class="required">*</span></label>
        <textarea id="description" name="description" required placeholder="Describe what you need…"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="budget">Budget (USD)</label>
          <input type="text" id="budget" name="budget" placeholder="e.g. 2000–5000">
        </div>
        <div class="form-group">
          <label for="deadline">Deadline</label>
          <input type="text" id="deadline" name="deadline" placeholder="e.g. end of July">
        </div>
      </div>

      <button type="submit" class="btn-submit">Send Inquiry</button>
      <div class="form-status" id="formStatus"></div>
    </form>
  </div>
</div>

<script>
document.getElementById("orderForm").addEventListener("submit", async function (e) {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector(".btn-submit");
  const status = document.getElementById("formStatus");

  status.className = "form-status loading";
  status.textContent = "Sending…";
  btn.disabled = true;

  const data = {
    name: form.name.value.trim(),
    email: form.email.value.trim(),
    company: form.company.value.trim(),
    service: form.service.value,
    description: form.description.value.trim(),
    budget: form.budget.value.trim(),
    deadline: form.deadline.value.trim(),
  };

  try {
    const res = await fetch("/api/order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    const json = await res.json();
    if (res.ok && json.success) {
      window.location.href = "/order/success/?id=" + json.orderId;
    } else {
      throw new Error(json.error || "Something went wrong");
    }
  } catch (err) {
    status.className = "form-status error";
    status.textContent = err.message || "Request failed. Please try again.";
    btn.disabled = false;
  }
});
</script>
{{ end }}
