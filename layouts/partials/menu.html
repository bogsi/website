{{ $currentPage := . }}

<script>
document.addEventListener('DOMContentLoaded', function () {
  var menus = document.querySelectorAll('.menu');
  document.body.addEventListener('click', function () {
    menus.forEach(function (m) { m.classList.remove('open'); });
  });
  menus.forEach(function (menu) {
    var trigger = menu.querySelector('.menu__trigger');
    if (!trigger) return;
    trigger.addEventListener('click', function (e) {
      e.stopPropagation();
      var isOpen = menu.classList.contains('open');
      menus.forEach(function (m) { m.classList.remove('open'); });
      if (!isOpen) menu.classList.add('open');
    });
  });
});
</script>

<nav class="navigation-menu">
  {{/* Desktop: flat list of all items */}}
  <ul class="navigation-menu__inner menu--desktop">
    {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL | absLangURL }}"
          {{- if eq $currentPage.RelPermalink (.URL | absLangURL) }} class="active"{{ end }}>
          {{ .Name }}
        </a>
      </li>
    {{ end }}
  </ul>

  {{/* Mobile: hamburger trigger + dropdown */}}
  <ul class="menu menu--mobile">
    <li class="menu__trigger">Menu&nbsp;▾</li>
    <li>
      <ul class="menu__dropdown">
        {{ range .Site.Menus.main }}
          <li>
            <a href="{{ .URL | absLangURL }}"
              {{- if eq $currentPage.RelPermalink (.URL | absLangURL) }} class="active"{{ end }}>
              {{ .Name }}
            </a>
          </li>
        {{ end }}
      </ul>
    </li>
  </ul>
</nav>
